- label: "Pull request pipeline"
  command: |
    #!/usr/bin/env bash
    set -eo pipefail
    echo "--- Downloading prerequisites"
    python3 -m pip install pyyaml

    curl -fsSL --retry-max-time 60 --retry 3 --retry-delay 5 -o /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    chmod a+x /usr/bin/yq

    echo "--- Fetching shared CI scripts"
    mkdir -p .ci
    curl -sL --retry 5 --retry-delay 5 https://github.com/logstash-plugins/.ci/archive/mashhurs-1.x.tar.gz \
      | tar zxf - --strip-components=1 -C .ci --skip-old-files

    export SHARED_CI_DIR=.ci
    export PLUGIN_DIR="$$(pwd)"
    export TARGET_BRANCH="${GITHUB_PR_TARGET_BRANCH:-main}"

    echo "--- Generating steps dynamically"
    set +e
    python3 .ci/buildkite/scripts/generate-job-steps.py > pipeline_steps.yml
    if [[ $$? -ne 0 ]]; then
      echo "^^^ +++"
      echo "There was a problem with generating pipeline steps."
      cat pipeline_steps.yml
      echo "Exiting now."
      exit 1
    else
      set -eo pipefail
      cat pipeline_steps.yml | yq .
    fi

    set -eo pipefail
    echo "--- Uploading steps to buildkite"
    cat pipeline_steps.yml | buildkite-agent pipeline upload
