name: Integration Tests

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration-tests:
    uses: logstash-plugins/.ci/.github/workflows/integration-tests.yml@feature/github-actions
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    with:
      timeout-minutes: 60
