name: Unit Tests

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    uses: logstash-plugins/.ci/.github/workflows/test.yml@feature/github-actions
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    with:
      timeout-minutes: 60

  debug-tmate:
    name: Debug - interactive shell
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup test environment
        id: setup
        uses: logstash-plugins/.ci/setup@feature/github-actions
        with:
          elastic-stack-version: '9.current'
          snapshot: false
          docker-env: 'dockerjdk21.env'

      - name: Build test container
        if: steps.setup.outputs.skip != 'true'
        run: |
          cd .ci
          export BUILDKIT_PROGRESS=plain
          docker compose build

      - name: Start tests in background
        if: steps.setup.outputs.skip != 'true'
        run: |
          cd .ci
          docker compose up &
          echo "Tests started in background (PID $!). Use 'docker compose logs -f' in .ci/ to watch."
          sleep 5

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          timeout-minutes: 60
